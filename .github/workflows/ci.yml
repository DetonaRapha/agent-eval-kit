name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # The whole suite runs on the deterministic mock judge:
      # no ANTHROPIC_API_KEY, no network, reproducible everywhere.
      - name: Run tests
        run: pytest -ra

      # Prove the end-to-end CLI path and its exit code, not just unit tests.
      - name: Smoke-test the CLI
        run: |
          python -m agent_eval \
            --dataset examples/golden.jsonl \
            --sut examples.tiny_rag:answer \
            --judge mock \
            --report out/
