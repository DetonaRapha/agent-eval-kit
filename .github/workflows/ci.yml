name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: lint + types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Ruff (format)
        run: ruff format --check .

      - name: Mypy (strict)
        run: mypy agent_eval

  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # The whole suite runs on the deterministic mock judge:
      # no ANTHROPIC_API_KEY, no network, reproducible everywhere.
      # Integration tests are opt-in and stay skipped here (see pyproject addopts).
      - name: Run tests with coverage
        run: pytest --cov=agent_eval --cov-report=term-missing --cov-fail-under=85

      # Prove the end-to-end CLI path and its exit code, not just unit tests.
      - name: Smoke-test the CLI
        run: |
          python -m agent_eval \
            --dataset examples/golden.jsonl \
            --sut examples.tiny_rag:answer \
            --judge mock \
            --report out/
